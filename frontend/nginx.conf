# ============================================================
# NGINX CONFIGURATION - Web Server for React App
# ============================================================
# nginx serves your built React app (static HTML/CSS/JS files).
# This config handles:
#   1. Serving static files
#   2. SPA routing (all routes -> index.html)
#   3. Gzip compression (smaller downloads)
#   4. Proxying /api requests to the backend
# ============================================================

server {
    # Listen on port 80 (standard HTTP port)
    # This is the port inside the container
    listen 80;

    # Server name - underscore means "match any hostname"
    server_name _;

    # Root directory where our built files live
    # (copied from /app/dist in the Dockerfile)
    root /usr/share/nginx/html;

    # Default file to serve when accessing a directory
    index index.html;

    # --------------------------------------------------------
    # GZIP COMPRESSION
    # --------------------------------------------------------
    # Compress files before sending to browser (faster downloads)
    # A 500KB JavaScript file might compress to 100KB!
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;  # Only compress files larger than 1KB

    # --------------------------------------------------------
    # API PROXY (for docker-compose setup)
    # --------------------------------------------------------
    # When frontend makes a request to /api/*, forward it to backend.
    # "backend" is the service name from docker-compose.yml
    # Docker's internal DNS resolves "backend" to the container's IP.
    location /api/ {
        # Forward request to backend service on port 8080
        proxy_pass http://backend:8080;

        # Pass original headers to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------
    # WEBSOCKET PROXY (for real-time updates)
    # --------------------------------------------------------
    # WebSocket connections need special headers for the upgrade
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        # These headers are required for WebSocket connections
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # --------------------------------------------------------
    # STATIC FILE CACHING
    # --------------------------------------------------------
    # Cache JavaScript, CSS, and images for 1 year.
    # Vite adds content hashes to filenames (app.a1b2c3.js)
    # so cached files are automatically invalidated when content changes.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --------------------------------------------------------
    # SPA (Single Page App) ROUTING
    # --------------------------------------------------------
    # This is the magic that makes React Router work!
    #
    # Problem: User visits /dashboard, but that file doesn't exist.
    # Solution: Serve index.html for ALL routes, let React handle routing.
    #
    # "try_files" tries each option in order:
    #   1. $uri - Try the exact file path (e.g., /favicon.ico)
    #   2. $uri/ - Try as a directory
    #   3. /index.html - Fall back to index.html (React takes over)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
