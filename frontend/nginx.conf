# ============================================================
# NGINX CONFIGURATION - Web Server for React App
# ============================================================
# nginx serves your built React app (static HTML/CSS/JS files).
#
# For LOCAL docker-compose: nginx proxies /api to backend
# For PRODUCTION (Railway): frontend calls backend URL directly
#                           (set via VITE_API_URL at build time)
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------
    # GZIP COMPRESSION - Smaller downloads
    # --------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # --------------------------------------------------------
    # API PROXY - For docker-compose local development only
    # --------------------------------------------------------
    # This only works when "backend" hostname is resolvable
    # (i.e., when running via docker-compose)
    # In production, VITE_API_URL points directly to backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # If backend isn't available (production), return 502
        # This is fine because production uses direct API calls
        proxy_connect_timeout 5s;
    }

    # --------------------------------------------------------
    # WEBSOCKET PROXY - For docker-compose local development
    # --------------------------------------------------------
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
    }

    # --------------------------------------------------------
    # STATIC FILE CACHING - Faster repeat visits
    # --------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --------------------------------------------------------
    # SPA ROUTING - All routes serve index.html
    # --------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
