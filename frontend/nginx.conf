# ============================================================
# NGINX CONFIGURATION - Web Server for React App
# ============================================================
# Serves static files and handles SPA routing.
# API calls go directly to backend via VITE_API_URL.
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------
    # GZIP COMPRESSION - Smaller downloads
    # --------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # --------------------------------------------------------
    # STATIC FILE CACHING - Faster repeat visits
    # --------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --------------------------------------------------------
    # SPA ROUTING - All routes serve index.html
    # --------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
